<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="Blog Post" />
    <meta name="author" content="slc03" />
    <title id="title">Blog</title>

    <link rel="icon" type="image/x-icon" href="static/assets/favicon.ico" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.5.0/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />
    <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,600;1,600&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Mulish:ital,wght@0,300;0,500;0,600;0,700;1,300;1,500;1,600;1,700&amp;display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Kanit:ital,wght@0,400;1,400&amp;display=swap" rel="stylesheet" />
    <link type="text/css" href="static/css/styles.css" rel="stylesheet" />
    <link type="text/css" href="static/css/main.css" rel="stylesheet" />
    <script type="text/javascript" src="static/js/bootstrap.bundle.min.js"></script>
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script type="text/javascript" src="static/js/marked.min.js"></script>
    <script>
        MathJax = {
            tex: {
                packages: {},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEnvironments: true
            }
        };
    </script>
    <script type="text/javascript" id="MathJax-script" src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>
</head>
<body>
    <nav class="header navbar navbar-expand-lg navbar-light fixed-top shadow-sm" id="mainNav">
        <div class="container px-5">
            <a class="navbar-brand fw-bold" href="index.html#blog">BLOG</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarResponsive"
                aria-controls="navbarResponsive" aria-expanded="false" aria-label="Toggle navigation">
                MENU
                <i class="bi-list"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarResponsive"></div>
        </div>
    </nav>

    <section class="bg-gradient-primary-to-secondary-light mt5 md5" style="padding-top:6rem">
        <div class="container px-5">
            <header>
                <h2 id="post-title"></h2>
                <div class="text-muted small" id="post-meta"></div>
            </header>
            <div class="main-body" id="post-md"></div>
        </div>
    </section>

    <footer class="bg-bottom text-center py-5">
        <div class="container px-5">
            <div class="text-white-50 small">
                <a href="index.html#blog" class="text-white">← back to BLOG</a>
            </div>
        </div>
    </footer>

    <script>
        const params = new URLSearchParams(window.location.search);
        const slug = params.get('slug');
        marked.use({ mangle: false, headerIds: false });

        if (!slug) {
            document.getElementById('post-title').textContent = 'No Blog Post';
        } else {
            fetch('contents/posts/index.json')
                .then(r => r.json())
                .then(list => {
                    const meta = list.find(p => p.slug === slug) || {};
                    document.title = (meta.title ? meta.title + ' - ' : '') + 'Blog';
                    document.getElementById('post-title').textContent = meta.title || slug;
                    document.getElementById('post-meta').textContent = meta.date || '';
                })
                .catch(() => {});

            fetch('contents/posts/' + slug + '.md')
                .then(r => {
                    if (!r.ok) throw new Error('not found');
                    return r.text();
                })
                .then(md => {
                    const html = marked.parse(md);
                    document.getElementById('post-md').innerHTML = html;
                    MathJax.typeset();
                })
                .catch(() => {
                    document.getElementById('post-title').textContent = 'No Blog Found';
                });
        }
    </script>
</body>
</html>
